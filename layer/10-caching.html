next_f=self.__next_f||[]).push([0]);self.__next_f.push([2,null])</script><script>self.__next_f.push([1,"1:HL[\"/13-layer-fullstack-architecture/_next/static/css/88ea12413c954cec.css\",\"style\"]\n"])</script><script>self.__next_f.push([1,"2:I[95751,[],\"\"]\n4:I[23809,[\"2291\",\"static/chunks/2291-6a63c767314eaf49.js\",\"3842\",\"static/chunks/3842-f99b65efc3b3ed65.js\",\"9439\",\"static/chunks/9439-70d869865e3180b8.js\",\"4790\",\"static/chunks/app/layer/%5Bid%5D/page-75bda0f389406b45.js\"],\"default\"]\n6:I[39275,[],\"\"]\n8:I[61343,[],\"\"]\n9:I[57163,[\"3185\",\"static/chunks/app/layout-5e8713c7e65b1c54.js\"],\"default\"]\nb:I[76130,[],\"\"]\n5:T530c,"])</script><script>self.__next_f.push([1,"# Layer 10: Caching \u0026 CDN\n## Speed at Every Level of the Stack\n\n\u003e **Layer role:** Caching stores copies of frequently accessed data closer to where it's needed — in memory, at the edge, in the browser — to reduce latency and database load. A well-designed caching strategy can reduce API response times from 500ms to 5ms and eliminate 90%+ of database queries.\n\n---\n\n## Table of Contents\n\n1. [Beginner Explanation](#beginner-explanation)\n2. [Cache Hierarchy](#cache-hierarchy)\n3. [Browser Caching](#browser-caching)\n4. [CDN Architecture](#cdn-architecture)\n5. [Application Cache (Redis)](#application-cache-redis)\n6. [Database Query Cache](#database-query-cache)\n7. [Cache Invalidation Strategies](#cache-invalidation-strategies)\n8. [Cache Patterns](#cache-patterns)\n9. [CDN Technologies](#cdn-technologies)\n10. [Architecture Diagram](#architecture-diagram)\n11. [Common Mistakes](#common-mistakes)\n12. [Best Practices](#best-practices)\n13. [Interview-Level Insights](#interview-level-insights)\n14. [Summary](#summary)\n15. [Production Checklist](#production-checklist)\n\n---\n\n## Beginner Explanation\n\nImagine you work at a company with a huge library of documents in the basement. Every time someone asks you a question, you have to walk to the basement, find the document, walk back, and read the answer. This takes 5 minutes each time.\n\nNow imagine keeping photocopies of the most-asked-about documents on your desk. Same question? Answer in 5 seconds. That's caching — keeping copies of data closer to where it's needed.\n\nThe challenge: when the original document changes (basement), your photocopy is outdated. This is the cache invalidation problem — one of the hardest problems in computer science.\n\n---\n\n## Cache Hierarchy\n\n```\nFastest ↑                                                    Closest to user\n─────────────────────────────────────────────────────────────────────────────\nL1: Browser Memory Cache      ~0ms      JS variables, React state\nL2: Browser HTTP Cache        ~0ms      Cached responses on disk\nL3: Service Worker Cache      ~1ms      PWA offline cache\nL4: CDN Edge Node            ~5-20ms    Closest geographic PoP\nL5: API Server Memory        ~0.1ms    In-process object cache\nL6: Redis / Memcached        ~1ms      Shared in-memory data store\nL7: Read Replicas            ~5ms      DB read without write contention\nL8: Primary Database         ~10-50ms  Source of truth\n─────────────────────────────────────────────────────────────────────────────\nSlowest ↓                                                   Furthest from user\n\nCache hit: Return from current level\nCache miss: Go to next level, then backfill current level\n```\n\n---\n\n## Browser Caching\n\n```mermaid\nsequenceDiagram\n    participant B as Browser\n    participant CDN as CDN\n    participant S as Server\n\n    Note over B,S: First visit\n    B-\u003e\u003eCDN: GET /app.js\n    CDN-\u003e\u003eS: Cache miss → forward\n    S--\u003e\u003eCDN: app.js + Cache-Control: max-age=31536000, immutable\n    CDN--\u003e\u003eB: app.js (cache this for 1 year)\n    B-\u003e\u003eB: Store in browser cache\n\n    Note over B,S: Second visit (within 1 year)\n    B-\u003e\u003eB: Check browser cache — HIT\n    B-\u003e\u003eB: Serve from disk — no network request!\n\n    Note over B,S: HTML (short cache — must be fresh)\n    B-\u003e\u003eCDN: GET /index.html\n    CDN--\u003e\u003eB: index.html + Cache-Control: no-cache, must-revalidate\n    B-\u003e\u003eCDN: Conditional request: If-None-Match: \"etag123\"\n    CDN--\u003e\u003eB: 304 Not Modified (no body — saves bandwidth)\n```\n\n### Cache-Control Headers\n\n```\nCache-Control: max-age=31536000, immutable\n  → Cache for 1 year. Content never changes (hashed filename).\n  → Use for: JS bundles, CSS, images with content-hash filenames\n  → app.abc123.js — filename changes when content changes\n\nCache-Control: no-cache\n  → Must revalidate with server before using cached version.\n  → Use for: index.html (must always have latest JS references)\n  → With ETag: only downloads body if content changed (304)\n\nCache-Control: no-store\n  → Never cache this. Never write to disk.\n  → Use for: sensitive responses (banking, health data)\n  → Strict privacy requirement\n\nCache-Control: public, max-age=300\n  → Cache for 5 minutes, CDN and browser both cache.\n  → Use for: news articles, product pages (change occasionally)\n\nCache-Control: private, max-age=3600\n  → Cache only in browser (not CDN). User-specific data.\n  → Use for: user profile, dashboard data\n```\n\n```nginx\n# Nginx cache headers by file type\nlocation ~* \\.(js|css|woff2)$ {\n    # Hashed filenames — immutable for 1 year\n    add_header Cache-Control \"public, max-age=31536000, immutable\";\n}\n\nlocation ~* \\.(png|jpg|webp|svg)$ {\n    # Images — cache for 30 days (may change)\n    add_header Cache-Control \"public, max-age=2592000\";\n    add_header Vary \"Accept\";  # Vary by Accept header for WebP negotiation\n}\n\nlocation = /index.html {\n    # HTML — revalidate every request\n    add_header Cache-Control \"no-cache, must-revalidate\";\n}\n\nlocation /api/ {\n    # API responses — no browser caching (CDN may cache via headers)\n    add_header Cache-Control \"no-store\";\n}\n```\n\n---\n\n## CDN Architecture\n\nA CDN (Content Delivery Network) has hundreds of servers (Points of Presence / PoPs) globally. When a user requests a resource, they're served from the nearest PoP.\n\n```mermaid\ngraph TB\n    subgraph Users[\"👤 Users Worldwide\"]\n        NYC[New York User]\n        LON[London User]\n        SYD[Sydney User]\n        TOK[Tokyo User]\n    end\n\n    subgraph CDN_Edge[\"🌐 CDN Edge Nodes (200+ PoPs)\"]\n        NYC_POP[NYC PoP\\nCache: HIT]\n        LON_POP[London PoP\\nCache: HIT]\n        SYD_POP[Sydney PoP\\nCache: MISS]\n        TOK_POP[Tokyo PoP\\nCache: HIT]\n    end\n\n    subgraph Origin[\"🏠 Origin Servers (us-east-1)\"]\n        ORIGIN[Your API + App Servers]\n    end\n\n    NYC --\u003e NYC_POP\n    LON --\u003e LON_POP\n    SYD --\u003e SYD_POP\n    TOK --\u003e TOK_POP\n\n    NYC_POP --\u003e|Cache hit, 8ms| NYC\n    LON_POP --\u003e|Cache hit, 12ms| LON\n    SYD_POP --\u003e|Cache miss → fetch origin| ORIGIN\n    ORIGIN --\u003e|Response + cache it| SYD_POP\n    SYD_POP --\u003e|200ms (includes origin fetch)| SYD\n    TOK_POP --\u003e|Cache hit, 15ms| TOK\n\n    style CDN_Edge fill:#dcfce7\n    style Origin fill:#fee2e2\n```\n\n**What CDNs cache:**\n- Static assets (JS, CSS, images, fonts, videos)\n- API responses (with appropriate Cache-Control)\n- Rendered HTML (for SSR/ISR pages)\n\n**What CDNs cannot cache:**\n- User-specific responses (must have `private` or no-cache headers)\n- POST/PUT/DELETE requests (by default)\n- Responses with `Set-Cookie` headers (unless configured)\n\n---\n\n## Application Cache (Redis)\n\nRedis is the workhorse of application-level caching. In-memory, ~1ms latency, rich data structures.\n\n```typescript\nimport { createClient } from 'redis'\n\nconst redis = createClient({ url: process.env.REDIS_URL })\nawait redis.connect()\n\n// ── Cache-Aside Pattern (most common) ───────────────────────\nasync function getUserProfile(userId: string): Promise\u003cUserProfile\u003e {\n  const cacheKey = `user:${userId}:profile`\n\n  // 1. Check cache\n  const cached = await redis.get(cacheKey)\n  if (cached) {\n    return JSON.parse(cached)\n  }\n\n  // 2. Cache miss — fetch from DB\n  const user = await db.user.findUnique({\n    where: { id: userId },\n    include: { profile: true, stats: true }\n  })\n  if (!user) throw new NotFoundError('User', userId)\n\n  // 3. Store in cache with TTL\n  const ttl = 300  // 5 minutes\n  await redis.setex(cacheKey, ttl, JSON.stringify(user))\n\n  return user\n}\n\n// ── Cache Invalidation ──────────────────────────────────────\nasync function updateUserProfile(userId: string, data: UpdateProfileInput) {\n  // Update database first\n  await db.user.update({ where: { id: userId }, data })\n\n  // Invalidate cache — next read fetches fresh from DB\n  await redis.del(`user:${userId}:profile`)\n\n  // If user appears in lists/feeds, invalidate those too\n  await redis.del(`feed:followers:${userId}`)\n}\n\n// ── Complex Cached Object (sorted set for leaderboard) ──────\nasync function updateLeaderboard(userId: string, score: number) {\n  await redis.zadd('leaderboard:weekly', { score, member: userId })\n}\n\nasync function getTopPlayers(limit = 10) {\n  const cacheKey = `leaderboard:top:${limit}`\n  const cached = await redis.get(cacheKey)\n  if (cached) return JSON.parse(cached)\n\n  // Fetch top N from sorted set (scores stored in Redis already)\n  const topIds = await redis.zrevrange('leaderboard:weekly', 0, limit - 1, 'WITHSCORES')\n\n  // Batch fetch user data\n  const users = await db.user.findMany({\n    where: { id: { in: topIds.filter((_, i) =\u003e i % 2 === 0) } }\n  })\n\n  const result = users.map((u, i) =\u003e ({ ...u, score: parseFloat(topIds[i * 2 + 1]) }))\n  await redis.setex(cacheKey, 60, JSON.stringify(result))  // Cache 1 minute\n  return result\n}\n```\n\n### Redis Data Structures\n\n| Structure | Example Key | Use Case | Command |\n|-----------|------------|---------|---------|\n| **String** | `user:123:profile` | Simple object cache | `GET/SET` |\n| **Hash** | `session:abc123` | Session data (field-level access) | `HGET/HSET` |\n| **List** | `notifications:user:123` | Activity feed, job queue | `LPUSH/LRANGE` |\n| **Set** | `online:users` | Unique items, membership | `SADD/SMEMBERS` |\n| **Sorted Set** | `leaderboard:2024` | Rankings, time-series | `ZADD/ZRANGE` |\n| **Stream** | `events:purchases` | Event log, pub/sub | `XADD/XREAD` |\n| **Bitmap** | `daily:active:2024-01` | Counting unique events efficiently | `SETBIT/BITCOUNT` |\n\n---\n\n## Cache Invalidation Strategies\n\n\u003e \"There are only two hard things in Computer Science: cache invalidation and naming things.\" — Phil Karlton\n\n### Strategy 1: TTL (Time to Live)\n\n```typescript\n// Simplest strategy: let cache expire on its own\nawait redis.setex('user:123', 300, JSON.stringify(user))  // Expires in 5 minutes\n\n// Pros: Simple, no explicit invalidation needed\n// Cons: Stale data for up to TTL duration\n\n// Choose TTL based on:\n// - How often data changes\n// - How much staleness is acceptable\n// - Database load savings\n\nconst ttls = {\n  'user:profile': 300,       // 5 min — changes occasionally\n  'post:123': 3600,          // 1 hour — rarely changes\n  'global:config': 86400,    // 1 day — almost never changes\n  'feed:latest': 60,         // 1 minute — changes frequently\n  'session:*': 1800,         // 30 min — auto-expire idle sessions\n  'trending:topics': 300,    // 5 min — aggregate, okay if slightly stale\n}\n```\n\n### Strategy 2: Write-Through Cache\n\n```typescript\n// Write to cache AND database simultaneously on every update\nasync function updatePost(postId: string, data: UpdatePostInput) {\n  const [updatedPost] = await Promise.all([\n    db.post.update({ where: { id: postId }, data }),\n    redis.setex(`post:${postId}`, 3600, JSON.stringify({\n      ...existingPost,\n      ...data,\n      updatedAt: new Date().toISOString(),\n    })),\n  ])\n\n  return updatedPost\n}\n\n// Pros: Cache always consistent with DB\n// Cons: Every write touches both DB and cache (higher write latency)\n// Best for: Read-heavy with infrequent writes\n```\n\n### Strategy 3: Cache-Aside (Lazy Loading)\n\n```typescript\n// Only cache on read misses. Explicitly invalidate on writes.\n// Most common pattern — already shown above\n\n// Pros: Only cache data that's actually read, simple\n// Cons: Cache cold on startup, first request after invalidation is slow\n```\n\n### Strategy 4: Event-Driven Invalidation\n\n```typescript\n// Database trigger or application event invalidates cache\n// Best for: complex invalidation logic, multiple cache keys per data change\n\n// Subscribe to database changes via CDC (Change Data Capture)\n// PostgreSQL LISTEN/NOTIFY\nawait db.query(`LISTEN user_updates`)\ndb.on('notification', async (msg) =\u003e {\n  const { userId } = JSON.parse(msg.payload)\n  // Invalidate all cache keys related to this user\n  const keys = await redis.keys(`user:${userId}:*`)\n  if (keys.length) await redis.del(keys)\n})\n\n// Application event (when you control the write)\neventBus.on('user.profile.updated', async ({ userId }) =\u003e {\n  await Promise.all([\n    redis.del(`user:${userId}:profile`),\n    redis.del(`user:${userId}:feed`),\n    redis.del(`suggestions:*`),  // User profile affects suggestions\n  ])\n})\n```\n\n---\n\n## Cache Patterns\n\n### Cache Stampede (Thundering Herd) Problem\n\n```\nProblem:\n  1. Cache key expires (TTL hit)\n  2. 1000 concurrent requests check cache — all miss simultaneously\n  3. All 1000 requests query the database\n  4. Database overwhelmed with 1000 identical queries\n  5. System either slows dramatically or crashes\n\nSolutions:\n```\n\n```typescript\n// Solution 1: Lock (mutex) — only one request queries DB\nasync function getCachedUser(userId: string) {\n  const cacheKey = `user:${userId}`\n  const lockKey = `lock:${cacheKey}`\n\n  // Try cache first\n  const cached = await redis.get(cacheKey)\n  if (cached) return JSON.parse(cached)\n\n  // Try to acquire lock\n  const locked = await redis.set(lockKey, '1', { NX: true, EX: 5 })\n\n  if (locked) {\n    try {\n      const user = await db.user.findUnique({ where: { id: userId } })\n      await redis.setex(cacheKey, 300, JSON.stringify(user))\n      return user\n    } finally {\n      await redis.del(lockKey)\n    }\n  } else {\n    // Another request has the lock — wait briefly and re-check cache\n    await new Promise(resolve =\u003e setTimeout(resolve, 100))\n    const retryCache = await redis.get(cacheKey)\n    if (retryCache) return JSON.parse(retryCache)\n    // Fall through to DB (lock may have failed/expired)\n    return db.user.findUnique({ where: { id: userId } })\n  }\n}\n\n// Solution 2: Early expiration + background refresh\nasync function getCachedUserEarlyExpire(userId: string) {\n  const cached = await redis.get(`user:${userId}`)\n  if (cached) {\n    const { data, expiresAt } = JSON.parse(cached)\n    // If expiring within next 30s, refresh in background\n    if (expiresAt - Date.now() \u003c 30000) {\n      refreshInBackground(userId)  // Don't await — update quietly\n    }\n    return data\n  }\n  // ... cache miss logic\n}\n```\n\n### Read-Through Cache (ORM-Level)\n\n```typescript\n// Prisma extension for automatic caching\nimport { withAccelerate } from '@prisma/extension-accelerate'\nconst prisma = new PrismaClient().$extends(withAccelerate())\n\n// Every findUnique/findMany automatically cached by Prisma Accelerate\nconst user = await prisma.user.findUnique({\n  where: { id: userId },\n  cacheStrategy: {\n    swr: 60,   // Stale-while-revalidate 60s\n    ttl: 300,  // Invalidate after 5 minutes\n  }\n})\n```\n\n---\n\n## CDN Technologies\n\n| Provider | Strengths | Use Case | Pricing |\n|---------|-----------|---------|---------|\n| **Cloudflare** | Security, DDoS, Workers, free tier | Most apps | Free → paid |\n| **AWS CloudFront** | AWS integration, Lambda@Edge | AWS ecosystem | Pay per GB |\n| **Fastly** | Real-time config changes (\u003c5s), detailed analytics | Large e-commerce | Pay per GB |\n| **Akamai** | Largest edge network, enterprise | Enterprise | Enterprise contract |\n| **Vercel Edge** | Next.js, edge functions | Next.js/React apps | Usage-based |\n| **Bunny CDN** | Cheapest, good performance | Budget-conscious | Pay per GB |\n\n---\n\n## Architecture Diagram\n\n```mermaid\ngraph TB\n    subgraph User[\"👤 User\"]\n        BR[Browser\\nL1 Cache: Memory\\nL2 Cache: HTTP Disk]\n    end\n\n    subgraph Edge[\"🌐 CDN Edge (Cloudflare/CloudFront)\"]\n        POP1[PoP NYC\\nStatic: cached\\nAPI: pass-through]\n        POP2[PoP London]\n    end\n\n    subgraph App_Cache[\"⚡ Application Cache\"]\n        REDIS_CLUSTER[Redis Cluster\\nUser profiles · Sessions\\nFeed · Config · Counters]\n    end\n\n    subgraph App[\"⚙️ API Servers\"]\n        API[API + In-Process Cache\\nHot objects in Node.js heap]\n    end\n\n    subgraph DB[\"🗄️ Database\"]\n        PG_PRIMARY[(PostgreSQL Primary)]\n        PG_REPLICA[(Read Replica\\nQuery cache + OS page cache)]\n    end\n\n    BR --\u003e|Cached static| BR\n    BR --\u003e|Cache miss| POP1\n    POP1 --\u003e|Static asset hit| BR\n    POP1 --\u003e|API or miss| API\n    API --\u003e|Cache hit| REDIS_CLUSTER\n    REDIS_CLUSTER --\u003e|HIT| API\n    API --\u003e|Cache miss| PG_REPLICA\n    PG_REPLICA --\u003e|Results| API\n    API --\u003e|Backfill| REDIS_CLUSTER\n\n    style User fill:#dbeafe\n    style Edge fill:#dcfce7\n    style App_Cache fill:#fef9c3\n    style DB fill:#fce7f3\n```\n\n---\n\n## Common Mistakes\n\n### 1. Caching User-Specific Data in CDN\n```typescript\n// ❌ User's dashboard page cached at CDN — User A sees User B's data!\nres.setHeader('Cache-Control', 'public, max-age=3600')\n\n// ✅ Private (per-user) responses are browser-only\n// User-specific API responses — no CDN caching\nres.setHeader('Cache-Control', 'private, no-cache')\n\n// ✅ Use Vary header if response varies by cookie/header\nres.setHeader('Vary', 'Cookie, Accept-Language')\n```\n\n### 2. Caching Without Considering Consistency\n```typescript\n// ❌ 1-hour cache on user balance — user pays, sees stale balance\nawait redis.setex(`user:${id}:balance`, 3600, balance.toString())\n\n// ✅ Short TTL or invalidate on write\n// For financial data: either very short TTL or no cache at all\n// If you must cache: invalidate immediately on balance change\nasync function recordPayment(userId: string, amount: number) {\n  await db.account.update({ ... })\n  await redis.del(`user:${userId}:balance`)  // Immediate invalidation\n}\n```\n\n### 3. No Cache Warm-up\n```bash\n# ❌ After deploy: all caches empty → DB hammered → site slow for 10 min\n# ✅ Warm up cache before switching traffic (blue-green)\n# Pre-populate top N most-requested items before deploying\nnode scripts/warm-cache.js --top-users=10000 --top-posts=50000\n```\n\n---\n\n## Best Practices\n\n1. **Cache at the right level** — Static assets → CDN. Computed objects → Redis. User session → Redis. DB queries → read replica or Redis.\n2. **Set appropriate TTLs** — Don't over-cache changing data. Don't under-cache stable data.\n3. **Cache keys must be unique** — Include all dimensions: `user:{userId}:posts:{page}:{sort}`\n4. **Monitor hit rates** — A hit rate below 70% means your caching strategy needs work.\n5. **Plan for stampedes** — Use locks or probabilistic early refresh for popular keys.\n\n---\n\n## Interview-Level Insights\n\n### Q: What is the difference between write-through and write-back cache?\n\n**A:** Write-through: on every write, update both cache and database synchronously. Cache is always consistent with DB. Higher write latency. Safer — no data loss if cache crashes.\n\nWrite-back (write-behind): write to cache first, return success, then asynchronously write to database. Lower write latency, risk of data loss if cache crashes before the background write completes. Used in storage systems (SSDs use write-back internally).\n\nFor web applications: write-through or cache-aside are most common. Write-back is too risky for most OLTP workloads.\n\n### Q: How does a CDN cache work, and how do you invalidate it?\n\n**A:** CDN edge nodes cache responses based on the URL + Vary headers + Cache-Control headers from the origin. When a cache miss occurs, the edge node fetches from origin and stores the response.\n\nInvalidation: 1) Wait for TTL expiration (simplest), 2) Programmatic purge via CDN API (Cloudflare API, CloudFront invalidations), 3) URL versioning (cache-busting via content hash in filename — no invalidation needed).\n\nURL versioning is the best practice for static assets — change the filename when content changes. No invalidation needed, perfect cache hits.\n\n---\n\n## Summary\n\nCaching is one of the highest-leverage optimizations in system design:\n\n1. **Browser cache** — Immutable content-hashed filenames, no-cache for HTML\n2. **CDN** — Edge-served static assets globally, millisecond latency\n3. **Redis** — Shared application cache, sub-millisecond access, rich data structures\n4. **Cache-aside** — The most flexible and common pattern\n5. **Invalidation** — TTL for simplicity, event-driven for consistency\n\nA 90% cache hit rate on your API means 90% fewer database queries. At scale, this is the difference between a $10K database and a $100K one.\n\n---\n\n## Production Checklist\n\n- [ ] Static assets served with content-hash filenames (immutable caching)\n- [ ] CDN configured for static assets\n- [ ] Cache-Control headers set correctly per resource type\n- [ ] Redis cluster (not single node) for HA\n- [ ] Redis persistence configured (AOF or RDB) for durability\n- [ ] Cache key naming convention documented\n- [ ] TTL values chosen based on data change frequency\n- [ ] Cache invalidation logic for all write paths\n- [ ] Cache hit rate monitored (target \u003e 80%)\n- [ ] Stampede protection on high-traffic keys\n- [ ] No user-specific data in CDN cache (Vary header or private)\n- [ ] Redis maxmemory policy set (allkeys-lru for cache use case)\n- [ ] Redis memory usage monitored and alerting configured\n\n---\n\n*Previous: [Layer 9: Rate Limiting →](../09-rate-limiting/README.md) | Next: [Layer 11: Scaling →](../11-scaling/README.md)*\n"])</script><script>self.__next_f.push([1,"7:[\"id\",\"10-caching\",\"d\"]\nc:[]\n"])</script><script>self.__next_f.push([1,"0:[[[\"$\",\"link\",\"0\",{\"rel\":\"stylesheet\",\"href\":\"/13-layer-fullstack-architecture/_next/static/css/88ea12413c954cec.css\",\"precedence\":\"next\",\"crossOrigin\":\"$undefined\"}]],[\"$\",\"$L2\",null,{\"buildId\":\"687G6AmDSWJu6BbAAbEax\",\"assetPrefix\":\"/13-layer-fullstack-architecture\",\"initialCanonicalUrl\":\"/layer/10-caching\",\"initialTree\":[\"\",{\"children\":[\"layer\",{\"children\":[[\"id\",\"10-caching\",\"d\"],{\"children\":[\"__PAGE__?{\\\"id\\\":\\\"10-caching\\\"}\",{}]}]}]},\"$undefined\",\"$undefined\",true],\"initialSeedData\":[\"\",{\"children\":[\"layer\",{\"children\":[[\"id\",\"10-caching\",\"d\"],{\"children\":[\"__PAGE__\",{},[[\"$L3\",[\"$\",\"$L4\",null,{\"activeId\":\"10-caching\",\"content\":\"$5\",\"headings\":[{\"id\":\"layer-10-caching-cdn\",\"text\":\"Layer 10: Caching \u0026 CDN\",\"level\":1},{\"id\":\"speed-at-every-level-of-the-stack\",\"text\":\"Speed at Every Level of the Stack\",\"level\":2},{\"id\":\"table-of-contents\",\"text\":\"Table of Contents\",\"level\":2},{\"id\":\"beginner-explanation\",\"text\":\"Beginner Explanation\",\"level\":2},{\"id\":\"cache-hierarchy\",\"text\":\"Cache Hierarchy\",\"level\":2},{\"id\":\"browser-caching\",\"text\":\"Browser Caching\",\"level\":2},{\"id\":\"cache-control-headers\",\"text\":\"Cache-Control Headers\",\"level\":3},{\"id\":\"nginx-cache-headers-by-file-type\",\"text\":\"Nginx cache headers by file type\",\"level\":1},{\"id\":\"cdn-architecture\",\"text\":\"CDN Architecture\",\"level\":2},{\"id\":\"application-cache-redis\",\"text\":\"Application Cache (Redis)\",\"level\":2},{\"id\":\"redis-data-structu
