)\n- Connected to the internet with a public IP address\n- Powerful enough to handle many simultaneous users\n\nDeployment is how you get new code onto those servers. Early teams do it manually via SSH. Professional teams automate it with pipelines that test, build, and deploy every code change.\n\n---\n\n## Types of Hosting\n\n```mermaid\ngraph TB\n    subgraph Options[\"Hosting Evolution\"]\n        BARE[Bare Metal Server\\nYou own the hardware\\nMost control, most work]\n        VM[Virtual Machine - VPS\\nRented slice of a server\\nDigitalOcean, Linode, EC2]\n        CONTAINER[Container - Docker/K8s\\nPackaged app + runtime\\nPortable, scalable]\n        PAAS[PaaS - Platform as a Service\\nDeploy code, not infra\\nHeroku, Railway, Render]\n        SERVERLESS[Serverless Functions\\nNo servers at all\\nVercel, Netlify, Lambda]\n    end\n\n    style BARE fill:#fee2e2\n    style VM fill:#fef9c3\n    style CONTAINER fill:#dcfce7\n    style PAAS fill:#dbeafe\n    style SERVERLESS fill:#f3e8ff\n```\n\n| Type | You Manage | Provider Manages | Best For | Examples |\n|------|-----------|-----------------|----------|---------|\n| **Bare Metal** | OS, runtime, networking, hardware | Nothing | High-performance, specific hardware | HPC, gaming servers |\n| **VPS/VM** | OS, runtime, app | Hardware, network | Full control, cost-effective | DigitalOcean, AWS EC2 |\n| **Containers** | App, container config | Host OS, hardware | Portability, microservices | Docker + Kubernetes |\n| **PaaS** | App code | Everything else | Rapid deployment | Heroku, Railway, Render |\n| **Serverless** | Function code | Everything | Event-driven, auto-scale | Vercel, Lambda, Cloud Run |\n\n---\n\n## Containers \u0026 Docker\n\nDocker packages your application and all its dependencies into a **container** — a consistent, isolated environment that runs identically everywhere.\n\n```\n\"It works on my machine\" → Solved by Docker\nYour machine: Node 20, Ubuntu 22.04, specific npm packages\nTheir server:  Node 18, CentOS 7, different packages  ← Bug\n\nDocker container: Node 20, exact npm packages, baked in\nSame everywhere: dev laptop, CI runner, staging, production ← No bug\n```\n\n### Dockerfile\n\n```dockerfile\n# ─── Build stage ─────────────────────────────────────────────\nFROM node:20-alpine AS builder\n\nWORKDIR /app\n\n# Copy package files first (cache optimization)\n# If these don't change, Docker reuses the cached layer\nCOPY package*.json ./\nRUN npm ci --only=production \u0026\u0026 npm cache clean --force\n\n# Copy source and build\nCOPY . .\nRUN npm run build\n\n# ─── Production stage ────────────────────────────────────────\n# Start fresh — only include what's needed to run\nFROM node:20-alpine AS production\n\n# Security: run as non-root user\nRUN addgroup -S app \u0026\u0026 adduser -S app -G app\nWORKDIR /app\n\n# Copy only built files and production dependencies\nCOPY --from=builder --chown=app:app /app/dist ./dist\nCOPY --from=builder --chown=app:app /app/node_modules ./node_modules\nCOPY --from=builder --chown=app:app /app/package.json .\n\nUSER app\n\nEXPOSE 3000\n\n# Health check — Kubernetes/load balancer uses this\nHEALTHCHECK --interval=30s --timeout=3s --start-period=5s --retries=3 \\\n  CMD wget -qO- http://localhost:3000/health || exit 1\n\nCMD [\"node\", \"dist/main.js\"]\n```\n\n### Docker Compose (Local Development)\n\n```yaml\n# docker-compose.yml\nversion: '3.9'\n\nservices:\n  api:\n    build:\n      context: .\n      target: development  # Use dev stage with hot reload\n    ports:\n      - \"3000:3000\"\n    environment:\n      - NODE_ENV=development\n      - DATABASE_URL=postgresql://postgres:password@db:5432/myapp\n      - REDIS_URL=redis://redis:6379\n    volumes:\n      - .:/app                   # Mount source for hot reload\n      - /app/node_modules        # Don't override installed modules\n    depends_on:\n      db:\n        condition: service_healthy\n      redis:\n        condition: service_started\n\n  db:\n    image: postgres:16-alpine\n    environment:\n      POSTGRES_USER: postgres\n      POSTGRES_PASSWORD: password\n      POSTGRES_DB: myapp\n    volumes:\n      - postgres_data:/var/lib/postgresql/data\n    healthcheck:\n      test: [\"CMD-SHELL\", \"pg_isready -U postgres\"]\n      interval: 5s\n      timeout: 5s\n      retries: 5\n    ports:\n      - \"5432:5432\"\n\n  redis:\n    image: redis:7-alpine\n    ports:\n      - \"6379:6379\"\n\nvolumes:\n  postgres_data:\n```\n\n---\n\n## Deployment Strategies\n\nChoosing the right deployment strategy determines how much risk each release carries.\n\n### Blue-Green Deployment\n\n```mermaid\ngraph TB\n    subgraph Before[\"Before Deploy\"]\n        LB1[Load Balancer] --\u003e|100% traffic| BLUE[Blue Environment\\nv1.0 - Current]\n        GREEN1[Green Environment\\nv2.0 - New] --- IDLE[Idle / Warming up]\n    end\n\n    subgraph Switch[\"Instant Switch\"]\n        LB2[Load Balancer] --\u003e|0% traffic| BLUE2[Blue v1.0]\n        LB2 --\u003e|100% traffic| GREEN2[Green v2.0]\n        Note1[Blue kept running\\nfor instant rollback]\n    end\n\n    style Before fill:#dbeafe\n    style Switch fill:#dcfce7\n```\n\n**Blue-Green process:**\n1. Deploy new version to \"green\" environment\n2. Run smoke tests against green\n3. Switch load balancer to send all traffic to green (instant cutover)\n4. Keep blue running for 15-30 minutes (instant rollback if problems)\n5. Decommission blue after confidence period\n\n**Best for:** Minimal downtime, instant rollback, high-risk releases.\n\n---\n\n### Canary Deployment\n\n```mermaid\ngraph LR\n    LB[Load Balancer] --\u003e|95% traffic| OLD[v1.0 - Stable]\n    LB --\u003e|5% traffic| NEW[v2.0 - Canary]\n\n    NEW --\u003e METRICS[Monitor Error Rate\\nLatency · Conversions]\n    METRICS --\u003e|Metrics OK| ROLLOUT[Gradually increase %\\n5% → 25% → 50% → 100%]\n    METRICS --\u003e|Metrics bad| ROLLBACK[Rollback to 0%]\n```\n\n**Canary process:**\n1. Deploy new version alongside current\n2. Route 5% of users to new version\n3. Monitor: error rate, latency, business metrics\n4. Gradually increase percentage if metrics are healthy\n5. Roll back if anything looks wrong\n\n**Best for:** High-traffic systems, risk-averse teams, A/B testing new features.\n\n---\n\n### Rolling Deployment\n\n```\nServers: [v1] [v1] [v1] [v1] [v1] [v1]\n\nStep 1:  [v2] [v1] [v1] [v1] [v1] [v1]  ← Replace one at a time\nStep 2:  [v2] [v2] [v1] [v1] [v1] [v1]\nStep 3:  [v2] [v2] [v2] [v1] [v1] [v1]\n...\nFinal:   [v2] [v2] [v2] [v2] [v2] [v2]\n```\n\n**Best for:** Kubernetes deployments (default strategy), gradual rollouts.\n\n**Risk:** During rollout, v1 and v2 run simultaneously. Your API must be backward-compatible (see \"Backwards Compatibility\" in best practices).\n\n---\n\n### Feature Flags\n\nThe most mature pattern: deploy code to 100% of servers but gate features with flags. Decouple deployment from release.\n\n```typescript\n// LaunchDarkly / GrowthBook / Unleash\nimport { launchDarkly } from './featureFlags'\n\nasync function getCheckoutFlow(userId: string) {\n  const useNewCheckout = await launchDarkly.variation('new-checkout-v2', {\n    key: userId,\n    // Can target by: userId, email, plan, country, random %\n  }, false)  // default = false\n\n  if (useNewCheckout) {\n    return renderNewCheckout()\n  }\n  return renderOldCheckout()\n}\n\n// Benefits:\n// - Deploy code to all servers at once\n// - Enable for 1% of users, monitor, then ramp up\n// - Instant kill switch: disable flag, feature off globally in seconds\n// - No new deployment needed to turn feature on/off\n```\n\n---\n\n## Environment Management\n\n```mermaid\ngraph LR\n    CODE[Source Code] --\u003e DEV[Development\\nLocal / dev.app.com]\n    DEV --\u003e STAGING[Staging\\nstaging.app.com\\nProduction-like data]\n    STAGING --\u003e PROD[Production\\napp.com]\n\n    style DEV fill:#dcfce7\n    style STAGING fill:#fef9c3\n    style PROD fill:#fee2e2\n```\n\n### Environment Variables\n\n```bash\n# .env.local (never committed to git)\nDATABASE_URL=postgresql://localhost/myapp_dev\nREDIS_URL=redis://localhost:6379\nJWT_SECRET=dev-secret-not-for-production\nSTRIPE_SECRET_KEY=sk_test_...\n\n# .env.production (managed by platform / secrets manager)\nDATABASE_URL=postgresql://prod-host.cluster.example.com/myapp\nREDIS_URL=redis://prod-redis.cache.example.com:6379\nJWT_SECRET=${SECRET_FROM_AWS_SECRETS_MANAGER}\nSTRIPE_SECRET_KEY=sk_live_...\n```\n\n```typescript\n// Validate env vars at startup — fail fast if misconfigured\nimport { z } from 'zod'\n\nconst envSchema = z.object({\n  DATABASE_URL: z.string().url(),\n  REDIS_URL: z.string().url(),\n  JWT_SECRET: z.string().min(32, 'JWT secret must be at least 32 characters'),\n  NODE_ENV: z.enum(['development', 'staging', 'production']),\n  PORT: z.string().regex(/^\\d+$/).default('3000').transform(Number),\n  STRIPE_SECRET_KEY: z.string().startsWith('sk_'),\n})\n\nexport const env = envSchema.parse(process.env)\n// If any variable is missing or invalid, the app crashes on startup\n// Better to fail at startup than to fail on first request\n```\n\n---\n\n## Serverless Deployment\n\nServerless means you deploy functions, not servers. The cloud provider runs them on demand.\n\n```mermaid\ngraph LR\n    REQ[HTTP Request] --\u003e EDGE[Edge Network]\n    EDGE --\u003e COLD{Function\\nCold?}\n    COLD -- Yes --\u003e INIT[Initialize Container\\n~200ms cold start]\n    COLD -- No --\u003e WARM[Reuse Container\\n~1ms warm start]\n    INIT --\u003e EXEC[Execute Function\\n~50ms]\n    WARM --\u003e EXEC\n    EXEC --\u003e RES[Response]\n\n    style COLD fill:#fef9c3\n    style INIT fill:#fee2e2\n    style WARM fill:#dcfce7\n```\n\n```typescript\n// Vercel Function (serverless)\n// File: pages/api/users/[id].ts\nimport type { NextApiRequest, NextApiResponse } from 'next'\n\nexport default async function handler(req: NextApiRequest, res: NextApiResponse) {\n  const { id } = req.query\n\n  if (req.method === 'GET') {\n    const user = await db.user.findUnique({ where: { id: id as string } })\n    if (!user) return res.status(404).json({ error: 'Not found' })\n    return res.json(user)\n  }\n\n  if (req.method === 'PUT') {\n    // ...\n  }\n\n  res.setHeader('Allow', ['GET', 'PUT'])\n  res.status(405).end('Method Not Allowed')\n}\n\nexport const config = {\n  runtime: 'edge',  // Run at CDN edge — ultra-low latency globally\n}\n```\n\n**Serverless pros:**\n- Zero server management\n- Auto-scales to zero (no traffic = no cost)\n- Instant global deployment\n- Pay per invocation\n\n**Serverless cons:**\n- Cold starts (first request after idle can be slow)\n- Execution time limits (15min max for Lambda)\n- Not suitable for: WebSockets, long-running processes, stateful apps\n- Database connections are problematic (use connection poolers like PgBouncer, Neon, Supabase)\n\n---\n\n## Platform Comparison\n\n| Platform | Type | Best For | Pricing Model | Verdict |\n|----------|------|---------|--------------|---------|\n| **Vercel** | Serverless/Edge | Next.js, frontend, edge functions | Per request + bandwidth | Best for Next.js apps |\n| **Netlify** | Serverless/Edge | Static sites, Jamstack | Per build + bandwidth | Best for static/Jamstack |\n| **Railway** | PaaS (containers) | Full-stack apps, databases | Per compute hour | Best for early-stage startups |\n| **Render** | PaaS (containers) | Web services, workers, DBs | Per compute hour | Heroku alternative |\n| **Fly.io** | Containers | Global low-latency apps | Per compute | Best for geo-distributed |\n| **AWS ECS/EKS** | Containers | Enterprise, complex infra | Per resource | Best for large scale |\n| **Google Cloud Run** | Serverless containers | APIs, microservices | Per request | Best serverless containers |\n| **DigitalOcean App Platform** | PaaS | Simple apps, cost-effective | Per app | Best bang for buck |\n\n---\n\n## Architecture Diagram\n\n```mermaid\ngraph TB\n    subgraph Dev[\"👩‍💻 Developer Machine\"]\n        CODE[Source Code]\n        DOCKER_LOCAL[Docker Compose\\nLocal Environment]\n    end\n\n    subgraph CI[\"🤖 CI/CD Pipeline\"]\n        TESTS[Automated Tests]\n        BUILD[Docker Build]\n        SCAN[Security Scan]\n        PUSH[Push to Registry]\n    end\n\n    subgraph Registry[\"📦 Container Registry\"]\n        ECR[AWS ECR\\nVersioned Images]\n    end\n\n    subgraph Staging[\"🟡 Staging Environment\"]\n        STAGE_LB[Load Balancer]\n        STAGE_APP[App Containers]\n        STAGE_DB[(Staging DB)]\n    end\n\n    subgraph Production[\"🟢 Production Environment\"]\n        PROD_LB[Load Balancer]\n        PROD_APP_OLD[v1.0 - 95%]\n        PROD_APP_NEW[v2.0 - 5% Canary]\n        PROD_DB[(Production DB)]\n        PROD_CACHE[(Redis Cache)]\n    end\n\n    CODE --\u003e CI\n    CI --\u003e TESTS\n    TESTS --\u003e|Pass| BUILD\n    BUILD --\u003e SCAN\n    SCAN --\u003e|Pass| PUSH\n    PUSH --\u003e ECR\n    ECR --\u003e Staging\n    STAGE_APP --\u003e STAGE_DB\n    ECR --\u003e|After staging approval| Production\n    PROD_LB --\u003e PROD_APP_OLD \u0026 PROD_APP_NEW\n    PROD_APP_OLD \u0026 PROD_APP_NEW --\u003e PROD_DB\n    PROD_APP_OLD \u0026 PROD_APP_NEW --\u003e PROD_CACHE\n\n    style Dev fill:#dbeafe\n    style CI fill:#fef9c3\n    style Staging fill:#dcfce7\n    style Production fill:#fee2e2\n```\n\n---\n\n## Common Mistakes\n\n### 1. Same Config Across Environments\n```yaml\n# ❌ Using production DB URL in staging — staging tests corrupt prod data\nDATABASE_URL: postgresql://prod-host/myapp\n\n# ✅ Separate environments, separate resources\nstaging:\n  DATABASE_URL: postgresql://staging-host/myapp_staging\nproduction:\n  DATABASE_URL: postgresql://prod-host/myapp\n```\n\n### 2. Not Testing Rollback\n```bash\n# ❌ Only testing forward deployments\n# When rollback is needed (3am production incident), nobody knows how\n\n# ✅ Practice rollbacks in staging monthly\n# Document rollback procedures\n# Kubernetes rollback:\nkubectl rollout undo deployment/api --to-revision=5\n# Verify rollback worked:\nkubectl rollout status deployment/api\n```\n\n### 3. Missing Health Checks\n```typescript\n// ❌ Load balancer routes traffic to crashed container\n\n// ✅ Health endpoint checks all dependencies\napp.get('/health', async (req, res) =\u003e {\n  const checks = await Promise.allSettled([\n    db.query('SELECT 1'),\n    redis.ping(),\n  ])\n\n  const healthy = checks.every(c =\u003e c.status === 'fulfilled')\n  res.status(healthy ? 200 : 503).json({\n    status: healthy ? 'healthy' : 'degraded',\n    checks: {\n      database: checks[0].status,\n      redis: checks[1].status,\n    }\n  })\n})\n```\n\n---\n\n## Best Practices\n\n1. **Immutable deployments** — Never modify running containers. Deploy new containers, shift traffic, kill old ones.\n2. **Zero-downtime deploys** — Use rolling/blue-green. Maintenance windows are a last resort.\n3. **Backwards-compatible changes** — When adding a column, add it nullable first. Never rename a column in one deploy.\n4. **Health checks everywhere** — Load balancer, Kubernetes, monitoring system all check `/health`.\n5. **Automate everything** — If you're SSHing to deploy, you will forget a step at 2am.\n\n---\n\n## Interview-Level Insights\n\n### Q: Explain the 12-factor app methodology.\n\n**A:** The 12-factor app is a methodology for building software-as-a-service apps that are: portable across environments, cloud-native, and can scale. Key factors relevant to hosting:\n\n- **Codebase**: One codebase, multiple deploys\n- **Config**: Store config in environment variables (not in code)\n- **Processes**: Run as stateless processes (state in DB/Redis, not in-memory)\n- **Port binding**: Export services via port binding (self-contained HTTP server)\n- **Concurrency**: Scale out via the process model (horizontal, not vertical)\n- **Disposability**: Fast startup, graceful shutdown — containers are cattle, not pets\n\n### Q: What's the difference between a blue-green and a canary deployment?\n\n**A:** Blue-green is binary — 100% of traffic switches instantly. It's safe (easy rollback), but provides no gradual validation. Canary is gradual — start with 5%, grow to 100% based on metrics. It validates new code with real users before full rollout. Blue-green is simpler; canary is safer for large user bases.\n\n---\n\n## Summary\n\nHosting and deployment are where code meets reality. The key principles:\n\n1. **Containerize everything** — Docker makes environments reproducible\n2. **Automate deployments** — Human error causes most outages\n3. **Choose a strategy** — Rolling for low risk, canary for high-traffic, blue-green for instant rollback\n4. **Separate environments** — Dev, staging, production must be isolated\n5. **Health check everything** — Know before users do\n\n---\n\n## Production Checklist\n\n- [ ] Docker multi-stage builds (minimal production image)\n- [ ] Non-root user in containers\n- [ ] Health check endpoint on every service\n- [ ] Zero-downtime deployment strategy chosen\n- [ ] Rollback procedure documented and tested\n- [ ] Environment variables validated at startup\n- [ ] Secrets in secrets manager (not .env files)\n- [ ] Staging environment mirrors production\n- [ ] Container registry with image scanning enabled\n- [ ] Resource limits set on containers (CPU/memory)\n- [ ] Graceful shutdown handler (SIGTERM)\n- [ ] Feature flags for risky changes\n\n---\n\n*Previous: [Layer 4: Auth →](../04-auth/README.md) | Next: [Layer 6: Cloud \u0026 Compute →](../06-cloud/README.md)*\n"])</script><script>self.__next_f.push([1,"7:[\"id\",\"05-hosting\",\"d\"]\nc:[]\n"])</script><script>self.__next_f.push([1,"0:[[[\"$\",\"link\",\"0\",{\"rel\":\"stylesheet\",\"href\":\"/13-layer-fullstack-architecture/_next/static/css/701af4a0022ecae4.css\",\"precedence\":\"next\",\"crossOrigin\":\"$undefined\"}]],[\"$\",\"$L2\",null,{\"buildId\":\"8mN2URjKne50xbp0IZVVO\",\"assetPrefix\":\"/13-layer-fullstack-architecture\",\"initialCanonicalUrl\":\"/layer/05-hosting\",\"initialTree\":[\"\",{\"children\":[\"layer
