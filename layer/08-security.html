lanation\n\nSecurity is like the defense layers of a medieval castle. The outer wall (firewall, HTTPS) stops most attacks. The moat (network security groups) makes breaching harder. The inner keep (application security) is the last line. Guards at each gate (auth middleware) verify identity. The vault (encrypted database) protects the crown jewels even if someone gets inside.\n\nA single breach in any layer and an attacker can steal user data, destroy records, or take control of your systems. Security is not about being paranoid — it's about being systematic.\n\n---\n\n## The OWASP Top 10\n\nThe OWASP Top 10 is the definitive list of the most critical web application security risks, updated every 3-4 years based on real-world breach data.\n\n| Rank | Risk | Frequency | Impact |\n|------|------|-----------|--------|\n| A01 | Broken Access Control | Very High | Data breach, privilege escalation |\n| A02 | Cryptographic Failures | High | Data exposure, PII breach |\n| A03 | Injection (SQL, NoSQL, OS) | High | Data theft, data destruction |\n| A04 | Insecure Design | Medium | Architectural vulnerabilities |\n| A05 | Security Misconfiguration | Very High | Exposed admin panels, default creds |\n| A06 | Vulnerable Components | High | Supply chain attacks |\n| A07 | Authentication Failures | High | Account takeover |\n| A08 | Integrity Failures | Medium | Code injection, CI/CD compromise |\n| A09 | Logging/Monitoring Failures | Medium | Undetected breaches |\n| A10 | SSRF | Medium | Internal network access |\n\n---\n\n## SQL Injection\n\nThe most classic and still most common critical vulnerability. An attacker injects malicious SQL into your queries.\n\n### The Attack\n\n```javascript\n// Vulnerable code — user input directly in SQL\nconst email = req.body.email  // Attacker sends: ' OR '1'='1\nconst query = `SELECT * FROM users WHERE email = '${email}'`\n// Becomes: SELECT * FROM users WHERE email = '' OR '1'='1'\n// Returns EVERY user in the database!\n\n// Worse:\n// email = \"'; DROP TABLE users; --\"\n// SELECT * FROM users WHERE email = ''; DROP TABLE users; --'\n// Destroys your entire users table!\n\n// Even worse for data exfiltration:\n// email = \"' UNION SELECT username, password, null FROM admin_users --\"\n// Returns admin credentials in the response!\n```\n\n### The Defense: Parameterized Queries\n\n```typescript\n// ❌ String interpolation — NEVER do this\nconst users = await db.query(`SELECT * FROM users WHERE email = '${email}'`)\n\n// ✅ Parameterized queries — SQL and data are always separate\n// The DB driver handles escaping, SQL structure cannot change\nconst users = await db.query(\n  'SELECT * FROM users WHERE email = $1',\n  [email]  // $1 is a placeholder, data is passed separately\n)\n\n// ✅ With Prisma ORM — automatically parameterized\nconst user = await prisma.user.findUnique({\n  where: { email }  // Never raw string interpolation\n})\n\n// ✅ With Knex query builder — automatically parameterized\nconst users = await db('users')\n  .where({ email })  // Safe\n  .select('id', 'email', 'name')  // Column whitelist\n```\n\n### Stored Procedures Don't Help if Used Wrong\n\n```sql\n-- ❌ Dynamic SQL in stored procedure — still vulnerable\nCREATE PROCEDURE get_user(IN email VARCHAR)\nBEGIN\n  SET @sql = CONCAT('SELECT * FROM users WHERE email = \"', email, '\"');\n  PREPARE stmt FROM @sql;\n  EXECUTE stmt;\nEND;\n\n-- ✅ Parameterized stored procedure\nCREATE PROCEDURE get_user(IN p_email VARCHAR)\nBEGIN\n  SELECT * FROM users WHERE email = p_email;  -- Direct parameter use\nEND;\n```\n\n---\n\n## Cross-Site Scripting (XSS)\n\nXSS allows attackers to inject malicious JavaScript into pages that other users visit.\n\n### Types of XSS\n\n```\nReflected XSS:\n  Attacker sends: https://bank.com/search?q=\u003cscript\u003esteal(document.cookie)\u003c/script\u003e\n  Server reflects the query in the page\n  Victim's browser executes the script\n  → Session cookie stolen\n\nStored XSS:\n  Attacker posts: \"Hi! Check this out: \u003cscript\u003esteal(document.cookie)\u003c/script\u003e\"\n  Server stores it in the database\n  Every user who sees the post runs the script\n  → All viewer sessions stolen\n\nDOM-based XSS:\n  No server involvement — client-side JS writes attacker-controlled input to DOM\n  document.getElementById('output').innerHTML = location.hash  // Vulnerable\n```\n\n### Defense\n\n```typescript\n// ❌ Raw HTML injection — any user input becomes executable script\nelement.innerHTML = userContent  // VULNERABLE\ndocument.write(userContent)      // VULNERABLE\n\n// ✅ Text content — React does this automatically for JSX\nelement.textContent = userContent  // Safe — displayed as text, not HTML\n\u003cdiv\u003e{userContent}\u003c/div\u003e           // Safe in React/Vue/Angular\n\n// ✅ When you MUST render HTML (e.g., rich text editor):\nimport DOMPurify from 'dompurify'\n\nconst sanitized = DOMPurify.sanitize(userContent, {\n  ALLOWED_TAGS: ['p', 'b', 'i', 'em', 'strong', 'a', 'ul', 'ol', 'li'],\n  ALLOWED_ATTR: ['href', 'target'],\n  FORBID_ATTR: ['style', 'onerror', 'onload'],  // Block inline handlers\n  ALLOW_DATA_ATTR: false,\n})\nelement.innerHTML = sanitized\n\n// ✅ Content Security Policy — defense in depth\n// Even if XSS succeeds, CSP prevents exfiltration\nres.setHeader('Content-Security-Policy',\n  \"default-src 'self'; \" +\n  \"script-src 'self' 'nonce-${nonce}'; \" +  // Only scripts with nonce\n  \"connect-src 'self' https://api.example.com; \" +\n  \"img-src 'self' https://cdn.example.com data:; \" +\n  \"frame-ancestors 'none';\"\n)\n```\n\n---\n\n## CSRF (Cross-Site Request Forgery)\n\nCSRF tricks a logged-in user's browser into making an unintended request to your server.\n\n### The Attack\n\n```\n1. User logs into bank.com → has session cookie\n2. User visits evil.com while still logged in\n3. evil.com contains hidden form:\n   \u003cimg src=\"https://bank.com/transfer?to=attacker\u0026amount=10000\"\u003e\n4. User's browser automatically includes bank.com's session cookie\n5. Transfer executes without user's knowledge!\n```\n\n### Defense\n\n```typescript\n// ❌ No CSRF protection — any site can trigger state changes\napp.post('/transfer', async (req, res) =\u003e {\n  // Uses session cookie automatically included by browser\n  await transfer(req.session.userId, req.body.to, req.body.amount)\n})\n\n// ✅ CSRF token (synchronizer token pattern)\nimport csrf from 'csurf'\n\n// Middleware: generates token on GET, validates on POST/PUT/DELETE\napp.use(csrf({ cookie: { httpOnly: true, secure: true } }))\n\napp.get('/transfer-form', (req, res) =\u003e {\n  // Send CSRF token to client with the form\n  res.render('transfer', { csrfToken: req.csrfToken() })\n})\n\napp.post('/transfer', (req, res) =\u003e {\n  // CSRF middleware validates req.body._csrf === session CSRF token\n  // Cross-origin requests cannot access the token → fail\n  transfer(req.session.userId, req.body.to, req.body.amount)\n})\n\n// ✅ SameSite cookie attribute (simpler, modern browsers)\n// SameSite=Strict: cookie NOT sent on cross-site requests\n// SameSite=Lax: cookie sent for top-level navigation only\nres.cookie('session', token, {\n  httpOnly: true,\n  secure: true,\n  sameSite: 'strict',  // Prevents CSRF without separate token\n})\n\n// ✅ For APIs with JWTs (not cookies):\n// CSRF is not an issue — browsers don't auto-include Authorization header\n// Custom headers cannot be set cross-origin without CORS preflight\n```\n\n---\n\n## Transport Security (HTTPS/TLS)\n\nAll traffic between users and your servers must be encrypted. Unencrypted HTTP is unacceptable in production.\n\n```\nWithout HTTPS:\n  User → [plaintext] → Attacker in middle → [plaintext] → Your server\n  Attacker reads passwords, tokens, PII\n  Attacker modifies responses (injects scripts!)\n  Coffee shop WiFi is a perfect MITM attack location\n\nWith HTTPS (TLS):\n  User → [encrypted] → Attacker in middle → [can't read/modify] → Your server\n  TLS certificate proves your server's identity (prevents impersonation)\n  Data encrypted with session key (forward secrecy)\n```\n\n```nginx\n# Nginx HTTPS configuration\nserver {\n    listen 443 ssl http2;\n    server_name example.com www.example.com;\n\n    ssl_certificate     /etc/letsencrypt/live/example.com/fullchain.pem;\n    ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;\n\n    # Modern TLS configuration (disable old vulnerable versions)\n    ssl_protocols TLSv1.2 TLSv1.3;\n    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:...;\n    ssl_prefer_server_ciphers off;\n\n    # HSTS — tell browsers to ALWAYS use HTTPS for this domain\n    add_header Strict-Transport-Security \"max-age=31536000; includeSubDomains; preload\" always;\n\n    # Other security headers\n    add_header X-Frame-Options \"DENY\" always;\n    add_header X-Content-Type-Options \"nosniff\" always;\n    add_header Referrer-Policy \"strict-origin-when-cross-origin\" always;\n    add_header Permissions-Policy \"geolocation=(), microphone=(), camera=()\" always;\n}\n\n# Redirect all HTTP to HTTPS\nserver {\n    listen 80;\n    return 301 https://$host$request_uri;\n}\n```\n\n---\n\n## Secrets Management\n\nSecrets (API keys, database passwords, JWT secrets) must never appear in source code.\n\n```mermaid\nflowchart LR\n    subgraph BAD[\"❌ Common Mistakes\"]\n        CODE[In source code\\n.env committed]\n        ENV[Hardcoded strings\\nconst KEY='abc123']\n        LOGS[Logged to console\\nconsole.log secret]\n    end\n\n    subgraph GOOD[\"✅ Production Approach\"]\n        AWS_SM[AWS Secrets Manager\\nVersioned, audited, rotatable]\n        VAULT[HashiCorp Vault\\nDynamic secrets, fine-grained access]\n        K8S_SECRET[Kubernetes Secrets\\nEncrypted at rest + RBAC]\n        GH_SECRET[GitHub Actions Secrets\\nCI/CD only, never in logs]\n    end\n\n    style BAD fill:#fee2e2\n    style GOOD fill:#dcfce7\n```\n\n```typescript\n// ❌ Secrets in environment variables (from .env committed to git)\nconst stripe = new Stripe(process.env.STRIPE_KEY!)  // Where did STRIPE_KEY come from?\n\n// ✅ Fetch secrets from AWS Secrets Manager at startup\nimport { SecretsManagerClient, GetSecretValueCommand } from '@aws-sdk/client-secrets-manager'\n\nconst secretsClient = new SecretsManagerClient({ region: 'us-east-1' })\n\nasync function getSecrets(): Promise\u003cAppSecrets\u003e {\n  const response = await secretsClient.send(new GetSecretValueCommand({\n    SecretId: 'production/myapp/api-keys',\n  }))\n  return JSON.parse(response.SecretString!)\n}\n\n// Rotate secrets automatically — AWS rotates every 90 days\n// Application fetches fresh secret on each startup (or caches with TTL)\n```\n\n```yaml\n# ✅ Kubernetes Secrets with External Secrets Operator\n# Syncs from AWS Secrets Manager into Kubernetes Secrets\napiVersion: external-secrets.io/v1beta1\nkind: ExternalSecret\nmetadata:\n  name: api-secrets\nspec:\n  refreshInterval: 1h  # Re-sync every hour (picks up rotations)\n  secretStoreRef:\n    name: aws-secrets-manager\n    kind: SecretStore\n  target:\n    name: api-secrets  # Creates a Kubernetes Secret with this name\n  data:\n    - secretKey: DATABASE_URL        # K8s Secret key\n      remoteRef:\n        key: production/myapp       # AWS Secrets Manager path\n        property: database_url      # JSON property\n    - secretKey: JWT_SECRET\n      remoteRef:\n        key: production/myapp\n        property: jwt_secret\n```\n\n---\n\n## Zero Trust Security Model\n\nTraditional security assumes everything inside the network perimeter is trusted. Zero Trust assumes everything is hostile — verify every request regardless of source.\n\n```\nTraditional \"Castle and Moat\" Model:\n  External: Untrusted\n  Internal network: Trusted ← WRONG — once attacker is inside, free movement\n\nZero Trust Model:\n  Every request, from anywhere, must be authenticated and authorized\n  No implicit trust based on network location\n  \"Verify explicitly, use least privilege, assume breach\"\n```\n\n**Zero Trust in practice:**\n\n```typescript\n// Every service-to-service call requires authentication\n// Even internal microservices cannot call each other without a valid token\n\n// Service A calls Service B (internal network)\nconst response = await fetch('http://user-service.internal/users/123', {\n  headers: {\n    // Service A's own JWT (signed with Service A's key)\n    'Authorization': `Bearer ${serviceAToken}`,\n    // Forward the user's original token for authorization decisions\n    'X-User-Token': userToken,\n  }\n})\n\n// Service B validates:\n// 1. Is the calling service authorized to call this endpoint? (service-to-service auth)\n// 2. Does the user have permission? (user authorization)\n```\n\n---\n\n## Row-Level Security (RLS)\n\nRLS moves authorization enforcement into the database layer — even if application code is buggy, the database enforces data access policies.\n\n```sql\n-- Social media app: users can only see their own posts or public posts\n\n-- Enable RLS (disabled by default)\nALTER TABLE posts ENABLE ROW LEVEL SECURITY;\nALTER TABLE posts FORCE ROW LEVEL SECURITY;  -- Even the table owner is restricted\n\n-- Policy: what a user can SELECT\nCREATE POLICY posts_read_policy ON posts\n  FOR SELECT\n  TO app_role  -- Only applies to app_role DB user\n  USING (\n    author_id = current_setting('app.user_id')::uuid\n    OR visibility = 'public'\n    OR (visibility = 'followers' AND EXISTS (\n      SELECT 1 FROM follows\n      WHERE follower_id = current_setting('app.user_id')::uuid\n        AND followee_id = posts.author_id\n    ))\n  );\n\n-- Policy: what a user can INSERT\nCREATE POLICY posts_insert_policy ON posts\n  FOR INSERT\n  TO app_role\n  WITH CHECK (\n    author_id = current_setting('app.user_id')::uuid  -- Can only create own posts\n  );\n\n-- Policy: what a user can UPDATE/DELETE\nCREATE POLICY posts_modify_policy ON posts\n  FOR UPDATE DELETE\n  TO app_role\n  USING (author_id = current_setting('app.user_id')::uuid);  -- Own posts only\n\n-- Application sets the context on each request\n-- PostgreSQL sessions — set per-transaction\nawait db.query(`SET LOCAL app.user_id = '${userId}'`)\n-- Now all queries in this transaction are automatically filtered\n```\n\n**RLS with Supabase (makes RLS easy):**\n\n```sql\n-- Supabase sets auth.uid() automatically from JWT\nCREATE POLICY \"Users see own data\"\n  ON user_profiles\n  FOR ALL\n  USING (user_id = auth.uid());\n\n-- Admin bypass\nCREATE POLICY \"Admins see all\"\n  ON user_profiles\n  FOR ALL\n  USING (\n    auth.uid() IN (SELECT id FROM admins)\n  );\n```\n\n---\n\n## Security Headers\n\nHeaders that browsers use to enforce security policies:\n\n```typescript\nimport helmet from 'helmet'\n\napp.use(helmet({\n  // Prevent clickjacking — page cannot be embedded in iframes\n  frameguard: { action: 'deny' },\n\n  // Prevent MIME type sniffing\n  noSniff: true,\n\n  // HSTS — force HTTPS for 1 year\n  hsts: {\n    maxAge: 31536000,       // 1 year in seconds\n    includeSubDomains: true,\n    preload: true,\n  },\n\n  // XSS protection (legacy but still useful for IE)\n  xssFilter: true,\n\n  // Referrer policy — don't leak URLs in Referer header\n  referrerPolicy: { policy: 'strict-origin-when-cross-origin' },\n\n  // Content Security Policy\n  contentSecurityPolicy: {\n    directives: {\n      defaultSrc: [\"'self'\"],\n      scriptSrc: [\"'self'\", \"'nonce-xxx'\"],\n      styleSrc: [\"'self'\", \"https://fonts.googleapis.com\"],\n      imgSrc: [\"'self'\", \"https://cdn.example.com\", \"data:\"],\n      connectSrc: [\"'self'\", \"https://api.example.com\", \"wss://ws.example.com\"],\n      fontSrc: [\"'self'\", \"https://fonts.gstatic.com\"],\n      objectSrc: [\"'none'\"],\n      frameAncestors: [\"'none'\"],\n      upgradeInsecureRequests: [],\n    }\n  },\n\n  // Permissions Policy — disable browser features you don't use\n  permittedCrossDomainPolicies: false,\n}))\n```\n\n---\n\n## Architecture Diagram\n\n```mermaid\ngraph TB\n    subgraph External[\"🌐 Internet\"]\n        ATTACKER[Attacker]\n        USER[Legitimate User]\n    end\n\n    subgraph Edge[\"🛡️ Edge Security\"]\n        WAF[Web Application Firewall\\nBlocklist · Rate limit · Geo-block]\n        DDOS[DDoS Protection\\nCloudflare]\n    end\n\n    subgraph TLS_Term[\"🔐 TLS Termination\"]\n        LB[Load Balancer\\nHTTPS only · HSTS · OCSP stapling]\n    end\n\n    subgraph App[\"⚙️ Application Layer\"]\n        AUTH_MW[Auth Middleware\\nJWT · Session validation]\n        INPUT_VAL[Input Validation\\nZod · sanitize]\n        HEADERS[Security Headers\\nHelmet · CSP]\n        AUDIT[Audit Logger]\n    end\n\n    subgraph Data[\"🗄️ Data Layer\"]\n        RLS[Row-Level Security\\nPostgreSQL Policies]\n        ENCRYPT[Encryption at Rest\\nAES-256]\n        PARAMS[Parameterized Queries\\nORM · pg driver]\n    end\n\n    subgraph Secrets[\"🔑 Secrets\"]\n        SM[AWS Secrets Manager\\nRotated · Audited]\n    end\n\n    ATTACKER --\u003e|Blocked| WAF\n    USER --\u003e WAF --\u003e LB\n    LB --\u003e AUTH_MW\n    AUTH_MW --\u003e INPUT_VAL --\u003e HEADERS\n    HEADERS --\u003e AUDIT\n    AUDIT --\u003e RLS --\u003e ENCRYPT --\u003e PARAMS\n    SM --\u003e|Injected at startup| App\n\n    style Edge fill:#fee2e2\n    style App fill:#dbeafe\n    style Data fill:#dcfce7\n    style Secrets fill:#fef9c3\n```\n\n---\n\n## Common Mistakes\n\n### 1. Trusting Client-Side Validation Only\n```typescript\n// ❌ Only validates in the browser\n// Client-side validation can be bypassed by sending raw HTTP requests\nfunction handleSubmit(data) {\n  if (!data.email) { showError('Email required'); return }\n  submitToServer(data)\n}\n\n// ✅ Always validate on the server — client validation is for UX only\nrouter.post('/users', (req, res) =\u003e {\n  const result = UserSchema.safeParse(req.body)\n  if (!result.success) return res.status(422).json(result.error)\n  // Server-side validation passed\n})\n```\n\n### 2. Verbose Error Messages\n```json\n// ❌ Leaks internal system details to attackers\n{\n  \"error\": \"ERROR:  relation \\\"users\\\" does not exist\\n  at /app/node_modules/pg/lib/query.js:76\"\n}\n\n// ✅ Generic message to client, detailed log server-side\n// Response:\n{ \"error\": \"Internal server error\", \"requestId\": \"abc-123\" }\n// Server log (internal only):\n// ERROR [abc-123] DB query failed: relation \"users\" does not exist at src/repos/user.ts:45\n```\n\n### 3. Missing Rate Limiting on Auth Endpoints\n```typescript\n// ❌ No rate limiting — 100,000 password attempts per second possible\napp.post('/login', loginHandler)\n\n// ✅ Strict rate limiting on auth\napp.post('/login', rateLimit({\n  windowMs: 15 * 60 * 1000,  // 15 minutes\n  max: 5,                     // 5 attempts per IP per 15 min\n  message: { error: 'Too many login attempts, try again in 15 minutes' },\n  standardHeaders: true,\n  legacyHeaders: false,\n  // Also lock account after N failures (see Layer 4)\n}), loginHandler)\n```\n\n---\n\n## Best Practices\n\n1. **Security by design** — Review security implications before writing code, not after.\n2. **Defense in depth** — Multiple layers: WAF, TLS, auth, input validation, RLS, encryption.\n3. **Principle of least privilege** — Every component (user, service, DB role) has only the permissions it needs.\n4. **Fail secure** — When errors occur, default to denying access, not allowing it.\n5. **Audit everything sensitive** — Login, privilege changes, data exports, admin actions logged with user ID and timestamp.\n6. **Regular dependency updates** — Dependabot + automated PRs for security patches.\n\n---\n\n## Interview-Level Insights\n\n### Q: What is SSRF and how do you prevent it?\n\n**A:** Server-Side Request Forgery. An attacker tricks your server into making HTTP requests to internal resources.\n\nExample: Your server accepts a URL and fetches it (`/fetch-image?url=...`). Attacker sends `url=http://169.254.169.254/latest/meta-data/iam/security-credentials/ec2-role` — this is the AWS instance metadata endpoint. Your server fetches it from inside the VPC, returns the IAM credentials. Attacker now has your AWS credentials.\n\nPrevention: Validate URLs against an allowlist of permitted domains. Block private IP ranges (10.x, 172.16-31.x, 192.168.x, 169.254.x). Use a DNS rebinding-aware library.\n\n### Q: Explain the difference between encryption and hashing.\n\n**A:** Encryption is reversible — encrypt with a key, decrypt with the same (or related) key. Use for: data you need to read back (credit card numbers, PII). Hashing is one-way — you cannot get the original input from the hash. Use for: passwords (you never need the plaintext, only verify that `hash(input) == stored_hash`).\n\nFor passwords: use bcrypt or Argon2 (slow by design, salted). Never MD5 or SHA1 for passwords — they're fast, which makes brute-forcing trivial.\n\n---\n\n## Summary\n\nSecurity is a practice, not a product. The key principles:\n\n1. **Input is untrusted** — Validate and sanitize everything from users or external systems\n2. **Defense in depth** — No single layer can stop all attacks\n3. **Least privilege** — Grant minimum permissions everywhere\n4. **Encrypt at rest and in transit** — HTTPS always, database encryption on\n5. **Audit and monitor** — You can't respond to attacks you don't know happened\n6. **RLS at the database** — Last line of defense against application bugs\n\n---\n\n## Production Checklist\n\n- [ ] HTTPS everywhere (no HTTP in production)\n- [ ] HSTS header with `preload`\n- [ ] Security headers (CSP, X-Frame-Options, X-Content-Type-Options)\n- [ ] All inputs validated on server side (Zod/Joi)\n- [ ] Parameterized queries throughout (no string interpolation in SQL)\n- [ ] XSS prevention: no raw HTML injection, CSP configured\n- [ ] CSRF protection: SameSite cookies or CSRF tokens\n- [ ] Secrets in secrets manager (not .env or code)\n- [ ] RLS enabled on sensitive tables (PostgreSQL)\n- [ ] Auth endpoints rate-limited\n- [ ] Dependency vulnerability scanning (Snyk / Dependabot)\n- [ ] Security headers tested with securityheaders.com\n- [ ] Error messages don't leak internals\n- [ ] Audit log for sensitive operations\n- [ ] Web Application Firewall (WAF) in front of API\n\n---\n\n*Previous: [Layer 7: CI/CD →](../07-cicd/README.md) | Next: [Layer 9: Rate Limiting →](../09-rate-limiting/README.md)*\n"])</script><script>self.__next_f.push([1,"7:[\"id\",\"08-security\",\"d\"]\nc:[]\n"])</script><script>self.__next_f.push([1,"0:[[[\"$\",\"link\",\"0\",{\"rel\":\"stylesheet\",\"href\":\"/13-layer-fullstack-architecture/_next/static/css/701af4a0022ecae4.css\",\"precedence\":\"next\",\"crossOrigin\":\"$undefined\"}]],[\"$\",\"$L2\",null,{\"buildId\":\"8mN2URjKne50xbp0IZVVO\",\"assetPrefix\":\"/13-layer-fullstack-architecture\",\"initialCanonicalUrl\":\"/layer/08-security\",\"initialTree\":[\"\",{\"children\":[\"layer\",{\"children\":[[\"id\",\"08-security\",\"d\"],{\"children\":[\"__PAGE__?{\\\"id\\\":\\\"08-security\\\"}\",{}]}]}]},\"$undefined\",\"$undefined\",true],\"initialSeedData\":[\"\",{\"children\":[\"layer\",{\"children\":[[\"id\",\"08-security\",\"d\"],{\"children\":[\"__PAGE__\",{},[[\"$L3\",[\"$\",\"$L4\",null,{\"activeId\":\"08-security\",\"content\":\"$5\",\"headings\":[{\"id\":\"layer-8-security-row-level-security\",\"text\":\"Layer 8: Security \u0026 Row-Level Security\",\"level\":1},{\"id\":\"defense-in-depth-across-every-layer\",\"text\":\"Defense in Depth Across Every Layer\",\"level\":2},{\"id\":\"table-of-contents\",\"text\":\"Table of Contents\",\"level\":2},{\"id\":\"beginner-explanation\",\"text\":\"Beginner Explanation\",\"level\":2},{\"id\":\"the-owasp-top-10\",\"text\":\"The OWASP Top 10\",\"level\":2},{\"id\":\"sql-injection\",\"text\":\"SQL Injection\",\"level\":2},{\"id\":\"the-attack\",\"text\":\"The Attack\",\"level\":3},{\"id\":\"the-defense-parameterized-queries\",\"text\":\"The Defense: Parameterized Queries\",\"level\":3},{\"id\":\"stored-procedures-dont-help-if-u
